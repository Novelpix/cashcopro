<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, height=720, initial-scale=1.0">
    <title>Slide 2 - Positionnement unique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        roboto: ['Roboto', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f4f8',
                            800: '#102a43', // Dark Blue
                            900: '#0a192f',
                        },
                        cash: {
                            500: '#10B981', // Green
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f1f5f9;
        }

        .slide {
            width: 1280px;
            height: 720px;
            background: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
        }

        .header-gradient {
            background: linear-gradient(90deg, #102a43 0%, #0a192f 100%);
        }

        .flow-line {
            position: absolute;
            border-left: 2px dashed #cbd5e1;
            height: 100%;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 0;
        }
    </style>
</head>

<body>
    <div class="slide">

        <!-- Header -->
        <header class="header-gradient text-white flex-none px-16 py-10">
            <h1 class="text-4xl font-extrabold font-sans">
                Une nouvelle catégorie d’optimisation intégrée.
            </h1>
        </header>

        <!-- Main Content -->
        <div class="flex-1 flex px-16 py-6 relative bg-brand-50 gap-12">

            <!-- Left: Principles -->
            <div class="w-1/2 flex flex-col justify-center space-y-8 z-10 pl-8">

                <div class="flex items-center gap-6">
                    <div class="w-4 h-4 rounded-full bg-cash-500"></div>
                    <h3 class="text-3xl font-bold text-brand-800">Pas de remplacement logiciel</h3>
                </div>

                <div class="flex items-center gap-6">
                    <div class="w-4 h-4 rounded-full bg-cash-500"></div>
                    <h3 class="text-3xl font-bold text-brand-800">Pas de migration</h3>
                </div>

                <div class="flex items-center gap-6">
                    <div class="w-4 h-4 rounded-full bg-cash-500"></div>
                    <h3 class="text-3xl font-bold text-brand-800">Activation par couche complémentaire</h3>
                </div>

                <div class="flex items-center gap-6">
                    <div class="w-4 h-4 rounded-full bg-cash-500"></div>
                    <h3 class="text-3xl font-bold text-brand-800">Aucune décision juridique automatisée</h3>
                </div>

            </div>

            <!-- Right: Entree strategique -->
            <div class="w-1/2 flex flex-col justify-center z-10 pr-8">
                <div class="bg-white rounded-3xl p-12 shadow-xl border-t-8 border-cash-500 relative">
                    <div class="relative z-10 text-center py-6">
                        <div
                            class="inline-block bg-brand-50 text-brand-800 font-bold px-4 py-1 rounded-full text-xs uppercase tracking-wider mb-8">
                            Entrée stratégique
                        </div>
                        <h2 class="text-4xl font-bold text-brand-900 leading-snug">
                            On commence par le cash.<br /><br />
                            <span class="text-cash-500">On construit ensuite l’infrastructure.</span>
                        </h2>
                    </div>
                </div>
            </div>

        </div>
    </div>
</body>

</html>
