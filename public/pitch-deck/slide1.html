<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, height=720, initial-scale=1.0">
    <title>Slide 1 - Résultats / Contexte stratégique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        roboto: ['Roboto', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f4f8',
                            100: '#d9e2ec',
                            500: '#334e68',
                            800: '#102a43', // Dark Blue
                            900: '#0a192f',
                        },
                        cash: {
                            500: '#10B981', // Green
                            600: '#059669',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f1f5f9;
        }

        .slide {
            width: 1280px;
            height: 720px;
            background: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            display: flex;
        }

        .bg-img-overlay {
            background-color: #0a192f;
            background-image: linear-gradient(90deg, #0a192f 45%, rgba(10, 25, 47, 0.8) 75%, transparent 100%), url('https://images.unsplash.com/photo-1554200876-56c2f25224fa?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center right;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body>
    <div class="slide bg-img-overlay">

        <!-- Left Column: The Problem & Hook -->
        <div class="w-7/12 h-full flex flex-col justify-center px-16 z-10 text-white">
            <div class="mb-4 inline-block">
                <span
                    class="bg-cash-500 text-white px-4 py-1.5 rounded-full text-sm font-bold tracking-widest uppercase">
                    Syndics Indépendants IDF
                </span>
            </div>

            <h1 class="text-5xl font-extrabold leading-tight mb-8">
                La trésorerie immobilisée fragilise les cabinets indépendants.
            </h1>

            <div class="space-y-6 mb-12">
                <div class="flex items-center">
                    <div class="text-red-400 mr-4"><i class="fa-solid fa-chart-bar text-xl"></i></div>
                    <div>
                        <p class="text-xl font-semibold">15–30% d’impayés en moyenne.</p>
                    </div>
                </div>
                <div class="flex items-center">
                    <div class="text-red-400 mr-4"><i class="fa-solid fa-sack-dollar text-xl"></i></div>
                    <div>
                        <p class="text-xl font-semibold">300k€ à 500k€ immobilisés pour 1 200–1 500 lots.</p>
                    </div>
                </div>
                <div class="flex items-center">
                    <div class="text-cash-500 mr-4"><i class="fa-solid fa-bullseye text-xl"></i></div>
                    <div>
                        <p class="text-xl font-semibold">Hypothèse prudente : 20% récupérables en 60 jours.</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Column: The Promise -->
        <div class="w-5/12 h-full flex flex-col justify-center pr-16 pl-8 z-10">
            <div class="glass-panel p-10 rounded-3xl shadow-2xl relative">
                <!-- Decorative element -->
                <div class="absolute -top-6 -right-6 w-24 h-24 bg-cash-500 rounded-full opacity-20 blur-xl"></div>

                <h3 class="text-4xl font-bold text-white mb-8 pb-4 text-center leading-snug">
                    L’optimisation financière devient prioritaire.
                </h3>
            </div>
        </div>

    </div>
</body>

</html>
