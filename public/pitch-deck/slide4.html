<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, height=720, initial-scale=1.0">
    <title>Slide 4 - Infrastructure IA globale</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Roboto:wght@400;500;700&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f4f8',
                            800: '#102a43', // Dark Blue
                            900: '#0a192f',
                        },
                        cash: '#10B981',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f1f5f9;
        }

        .slide {
            width: 1280px;
            height: 720px;
            background: white;
            position: relative;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
        }

        /* Flowchart CSS */
        .module-box {
            border-top: 4px solid #10B981;
            transition: all 0.3s;
            position: relative;
            z-index: 10;
        }

        .module-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .line-h {
            position: absolute;
            height: 2px;
            background: #cbd5e1;
            z-index: 1;
        }

        .line-v {
            position: absolute;
            width: 2px;
            background: #cbd5e1;
            z-index: 1;
        }
    </style>
</head>

<body>
    <div class="slide bg-slate-50 flex flex-col">

        <!-- Header -->
        <header class="bg-white flex-none px-12 py-8 border-b border-slate-200">
            <div class="flex justify-between items-center">
                <div class="max-w-3xl">
                    <span
                        class="text-brand-800 text-xs font-bold uppercase tracking-widest bg-brand-50 px-3 py-1 rounded">Vision
                        Système</span>
                    <h1 class="text-4xl font-extrabold text-brand-900 mt-4 mb-2">
                        Architecture modulaire progressive.
                    </h1>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col p-12 gap-8 z-10 justify-center bg-slate-50 text-brand-900">

            <div class="flex justify-center gap-8 items-stretch h-[380px]">

                <!-- Bloc 1 -->
                <div
                    class="w-1/3 bg-white border border-slate-200 p-10 rounded-3xl flex flex-col justify-center items-center text-center shadow-lg relative transform transition-transform hover:-translate-y-2">
                    <i class="fa-solid fa-sack-dollar text-cash text-6xl mb-8"></i>
                    <h3 class="font-extrabold text-brand-900 text-2xl mb-4">Optimisation recouvrement</h3>
                </div>

                <!-- Bloc 2 -->
                <div
                    class="w-1/3 bg-white border border-slate-200 p-10 rounded-3xl flex flex-col justify-center items-center text-center shadow-lg relative transform transition-transform hover:-translate-y-2">
                    <i class="fa-solid fa-phone-slash text-brand-500 text-6xl mb-8"></i>
                    <h3 class="font-extrabold text-brand-900 text-2xl mb-4">Réduction interruptions</h3>
                </div>

                <!-- Bloc 3 -->
                <div
                    class="w-1/3 bg-brand-900 border border-brand-800 p-10 rounded-3xl flex flex-col justify-center items-center text-center shadow-lg relative transform transition-transform hover:-translate-y-2">
                    <i class="fa-solid fa-gauge-high text-cash text-6xl mb-8"></i>
                    <h3 class="font-extrabold text-white text-2xl mb-4">Pilotage dirigeant</h3>
                </div>

            </div>

            <!-- Bottom Note -->
            <div class="text-center mt-10">
                <p class="mt-5 text-brand-900 font-extrabold text-2xl">Activation séquentielle. Mesure avant extension.
                </p>
            </div>

        </div>
    </div>
</body>

</html>
